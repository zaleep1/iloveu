<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Dancing Script', cursive;
  }

  /* ===== BUBBLES ===== */
  #bubbles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .bubble {
    position: absolute;
    font-size: 26px;
    animation: floatUp 9s forwards ease-in-out;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: scale(0.5) translateY(0); }
    15%  { opacity: 1; transform: scale(1.1) translateY(-60px); }
    85%  { opacity: 0.7; transform: scale(1) translateY(-85vh); }
    100% { opacity: 0; transform: scale(0.6) translateY(-100vh); }
  }

  /* ===== CANVAS ===== */
  #heartCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }

  /* ===== TYPEWRITER TEXT ===== */
  #loveText {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Dancing Script', cursive;
    font-size: clamp(28px, 8vw, 72px);
    color: #ff2e6b;
    text-shadow: 0 0 18px #ff6fa8, 0 0 40px #ff2e6b;
    white-space: nowrap;
    letter-spacing: 3px;
    z-index: 6;
  }
  #cursor {
    display: inline-block;
    width: 3px;
    background: #ff6fa8;
    margin-left: 3px;
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
    height: 0.85em;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ===== CENTER IMAGE ===== */
  #centerImg {
    position: absolute;
    transform: translate(-52%, -50%);
    border-radius: 50%;
    object-fit: cover;
    pointer-events: none;
    z-index: 5;
    filter: drop-shadow(0 0 18px #ff2e6b) drop-shadow(0 0 40px #ff6fa8);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1);    filter: drop-shadow(0 0 18px #ff2e6b) drop-shadow(0 0 40px #ff6fa8); }
    50%       { transform: translate(-50%, -50%) scale(1.07); filter: drop-shadow(0 0 30px #ff2e6b) drop-shadow(0 0 60px #ff6fa8); }
  }
</style>
</head>
<body>

<audio id="music" src="iloveu.mp3" loop></audio>
<div id="bubbles"></div>
<canvas id="heartCanvas"></canvas>
<img id="centerImg" src="iloveu.png" alt="love">
<div id="loveText"><span id="typed"></span><span id="cursor"></span></div>

<script>
/* ===========================
   MUSIC
   =========================== */
const music = document.getElementById("music");
music.volume = 0.7;
// Autoplay on first interaction (browser policy)
function startMusic() {
  music.play();
  document.removeEventListener("click", startMusic);
  document.removeEventListener("touchstart", startMusic);
}
// Try autoplay directly, fallback to interaction
music.play().catch(() => {
  document.addEventListener("click", startMusic);
  document.addEventListener("touchstart", startMusic);
});

/* ===========================
   TYPEWRITER
   =========================== */
const fullText = "Te amo Alexa";
const typed = document.getElementById("typed");
let charIndex = 0;
function typeWriter() {
  if (charIndex < fullText.length) {
    typed.textContent += fullText[charIndex];
    charIndex++;
    setTimeout(typeWriter, 110);
  }
}
setTimeout(typeWriter, 800);

/* ===========================
   BUBBLES — solo corazones
   =========================== */
const heartEmojis = ["💕","❤️‍🔥","💓","💝","💖","💗","💞","❤️","🩷","💘"];
setInterval(() => {
  const b = document.createElement("div");
  b.className = "bubble";
  b.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  b.style.left = Math.random() * 95 + "vw";
  b.style.top  = (80 + Math.random() * 20) + "vh";
  document.getElementById("bubbles").appendChild(b);
  setTimeout(() => b.remove(), 7000);
}, 600);

/* ===========================
   HEART WORD ANIMATION
   =========================== */
const canvas = document.getElementById("heartCanvas");
const ctx    = canvas.getContext("2d");

// Use full viewport — works on mobile and desktop
const VW = window.innerWidth;
const VH = window.innerHeight;
canvas.width  = VW;
canvas.height = VH;

// Heart fits 80% of the narrower dimension, centered horizontally
// and placed in the upper ~72% of the screen (leaving room for text below)
const HEART_SIZE = Math.min(VW, VH) * 0.88;
const CX = VW * 0.47;           // slightly left
const CY = VH * 0.40;          // slightly higher
const R  = HEART_SIZE * 0.38;

// Heart parametric
function heartPoint(t) {
  const x = CX + R * 0.04 * 16 * Math.pow(Math.sin(t), 3);
  const y = CY - R * 0.04 * (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

// Pre-compute path
const TOTAL_POINTS = 600;
const heartPath = [];
for (let i = 0; i < TOTAL_POINTS; i++) {
  const t = (i / TOTAL_POINTS) * Math.PI * 2;
  heartPath.push(heartPoint(t));
}

// Words
const words = ["I love u", "I love you", "te amo", "I love u"];
const NUM_WORDS = 110;
const particles = [];

for (let i = 0; i < NUM_WORDS; i++) {
  const pathIndex = (i / NUM_WORDS) * TOTAL_POINTS;
  const word  = words[i % words.length];
  const size  = 13 + Math.random() * 12;
  const speed = 0.15 + Math.random() * 0.25;

  particles.push({
    pathIndex, word, size, speed,
    hue:   340 + Math.random() * 30,
    sat:   80  + Math.random() * 20,
    lit:   50  + Math.random() * 30,
    alpha: 0.6 + Math.random() * 0.4,
  });
}

// Also position center image dynamically via JS for pixel-perfect centering
const img = document.getElementById("centerImg");
const imgSize = HEART_SIZE * 0.28;
img.style.width  = imgSize + "px";
img.style.height = imgSize + "px";
img.style.top    = CY + "px";
img.style.left   = CX + "px";

function draw() {
  ctx.clearRect(0, 0, VW, VH);

  for (const p of particles) {
    p.pathIndex = (p.pathIndex + p.speed) % TOTAL_POINTS;

    const idx  = Math.floor(p.pathIndex);
    const next = (idx + 1) % TOTAL_POINTS;
    const frac = p.pathIndex - idx;

    const px = heartPath[idx].x + (heartPath[next].x - heartPath[idx].x) * frac;
    const py = heartPath[idx].y + (heartPath[next].y - heartPath[idx].y) * frac;

    ctx.font = `${p.size}px 'Dancing Script', cursive`;
    ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha})`;
    ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
    ctx.shadowBlur  = 8;
    ctx.fillText(p.word, px, py);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
